<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Topografia - Contagem de Croqui</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root{--bg:#f8fafc;--white:#fff;--s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;--s500:#64748b;--s700:#334155;--s800:#1e293b;--s900:#0f172a;--b50:#eff6ff;--b100:#dbeafe;--b200:#bfdbfe;--b300:#93c5fd;--b500:#3b82f6;--b600:#2563eb;--b700:#1d4ed8;--b900:#1e3a5f;--g50:#f0fdf4;--g500:#22c55e;--g600:#16a34a;--g700:#15803d;--e600:#059669;--e700:#047857;--o600:#ea580c;--r500:#ef4444}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--s900);height:100vh;display:flex;flex-direction:column;overflow:hidden}
        header{background:var(--white);border-bottom:1px solid var(--s200);display:flex;align-items:center;justify-content:space-between;padding:6px 12px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.05);z-index:20;flex-wrap:wrap;gap:4px}
        .hdr-left,.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .hdr-row2{width:100%;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
        .logo{display:flex;align-items:center;gap:6px}
        .logo-icon{background:var(--b700);color:#fff;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900}
        .logo-text{font-weight:800;font-size:11px;color:var(--b900);line-height:1.2}
        .ns-group{border-left:1px solid var(--s200);padding-left:10px}
        .ns-label{font-size:8px;font-weight:700;color:var(--s400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
        .ns-input{border:1px solid var(--s300);border-radius:6px;padding:5px 8px;font-size:12px;width:120px;font-family:'Courier New',monospace;outline:none;transition:all .2s}
        .ns-input:focus{border-color:var(--b500);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
        .ns-input.valid{border-color:var(--g500);background:var(--g50);color:var(--g700)}
        .bar{display:flex;align-items:center;gap:3px;background:var(--s100);padding:4px;border-radius:8px;border:1px solid var(--s200);flex-wrap:wrap}
        .bar-label{font-size:7px;font-weight:700;color:var(--s400);text-transform:uppercase;letter-spacing:.05em;padding:0 6px}
        .bar-btn{font-size:8px;font-weight:700;padding:4px 8px;border-radius:6px;border:1px solid var(--s200);background:var(--white);color:var(--s500);cursor:pointer;transition:all .15s;white-space:nowrap}
        .bar-btn:hover{border-color:var(--b300)}
        .bar-btn.active{background:var(--b600);border-color:var(--b600);color:#fff;box-shadow:0 1px 3px rgba(37,99,235,.3)}
        .bar-btn.active-green{background:var(--e600);border-color:var(--e600);color:#fff}
        .bar-btn.active-amber{background:#d97706;border-color:#d97706;color:#fff}
        .btn-voltar{font-size:10px;font-weight:700;color:var(--s400);background:none;border:none;cursor:pointer}
        .btn-voltar:hover{color:var(--s700)}
        .btn-salvar{background:var(--g600);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(22,163,74,.25);transition:all .15s}
        .btn-salvar:hover{background:var(--g700);transform:translateY(-1px)}
        .btn-portal{background:none;border:1px solid var(--b500);color:var(--b600);padding:6px 12px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s}
        .btn-portal:hover{background:rgba(59,130,246,.05)}
        .btn-config{background:none;border:1px solid var(--s300);color:var(--s500);padding:6px 12px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s}
        .btn-config:hover{background:var(--s100)}
        main{flex:1;overflow:hidden;display:flex;position:relative}
        .tela-upload{width:100%;height:100%;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1280px;margin:0 auto}
        .drop-area{border:2px dashed var(--s300);border-radius:1.5rem;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
        .drop-area:hover{background:rgba(239,246,255,.5);border-color:#60a5fa}
        .drop-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:10}
        .drop-icon{background:var(--b100);color:var(--b600);width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;transition:transform .3s}
        .drop-area:hover .drop-icon{transform:scale(1.1)}
        .drop-title{font-size:20px;font-weight:700;color:var(--s700)}
        .drop-sub{font-size:12px;color:var(--s400);margin-top:6px}
        .hist-panel{background:var(--white);border:1px solid var(--s200);border-radius:1.5rem;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
        .hist-header{padding:16px 20px;border-bottom:1px solid var(--s200);display:flex;flex-direction:column;gap:10px;background:var(--white);z-index:10}
        .hist-top{display:flex;justify-content:space-between;align-items:center}
        .hist-title{font-weight:700;color:var(--s700);font-size:14px;display:flex;align-items:center;gap:8px}
        .hist-btns{display:flex;gap:6px}
        .btn-excel{background:var(--e600);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s}
        .btn-excel:hover{background:var(--e700)}
        .btn-rel7{background:#7c3aed;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
        .btn-rel7:hover{background:#6d28d9}
        .filtros{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .filtros label{font-size:9px;font-weight:700;color:var(--s400)}
        .filtros input[type="date"]{border:1px solid var(--s200);border-radius:6px;padding:4px 8px;font-size:11px;outline:none;font-family:'Inter',sans-serif}
        .filtros input[type="date"]:focus{border-color:var(--b500)}
        .btn-filtro{font-size:9px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid var(--s200);background:var(--white);color:var(--s500);cursor:pointer}
        .btn-filtro:hover{background:var(--s100)}
        .btn-filtro.hoje{background:var(--b600);color:#fff;border-color:var(--b600)}
        .hist-list{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:var(--s50)}
        .hist-list::-webkit-scrollbar{width:6px}
        .hist-list::-webkit-scrollbar-thumb{background:var(--s300);border-radius:3px}
        .hist-empty{text-align:center;padding:60px 0;color:var(--s300);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
        .hist-item{background:var(--white);padding:12px 16px;border-radius:10px;border:1px solid var(--s100);display:flex;justify-content:space-between;align-items:center;transition:box-shadow .2s;position:relative}
        .hist-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
        .hist-ns{font-weight:700;color:var(--s800);font-size:13px}
        .hist-meta{font-size:9px;color:var(--s400);font-weight:700;text-transform:uppercase;margin-top:3px}
        .hist-tags{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
        .hist-tag{font-size:7px;padding:2px 5px;border-radius:3px;font-weight:700;text-transform:uppercase;border:1px solid}
        .hist-tag.cat{background:var(--b50);color:var(--b600);border-color:var(--b100)}
        .hist-tag.top{background:#faf5ff;color:#7c3aed;border-color:#e9d5ff}
        .hist-tag.amb{background:#ecfdf5;color:var(--e600);border-color:#a7f3d0}
        .hist-tag.ser{background:#fffbeb;color:#d97706;border-color:#fde68a}
        .hist-tag.km{background:#fef2f2;color:#dc2626;border-color:#fecaca}
        .hist-total{font-size:16px;font-weight:900;color:var(--b700)}
        .hist-del{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--s200);cursor:pointer;font-size:13px;opacity:0;transition:all .15s}
        .hist-item:hover .hist-del{opacity:1}
        .hist-del:hover{color:var(--r500)}
        .tela-desenho{display:flex;width:100%;height:100%}
        .canvas-area{flex:1;overflow:auto;background:var(--s200);display:flex;align-items:flex-start;justify-content:center;padding:40px;position:relative}
        .canvas-wrapper{position:relative;box-shadow:0 25px 50px rgba(0,0,0,.15);background:#fff;border:8px solid #fff;border-radius:4px;line-height:0;user-select:none;transform-origin:top center}
        .canvas-wrapper canvas{display:block}
        .canvas-wrapper canvas:first-child{background:#fff}
        .canvas-overlay{background:transparent!important}
        .canvas-overlay{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair}
        .float-controls{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:30}
        .float-group{display:flex;align-items:center;gap:2px;background:var(--white);padding:6px 10px;border-radius:20px;box-shadow:0 4px 12px rgba(0,0,0,.15);border:1px solid var(--s200)}
        .float-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:4px 8px;color:var(--s700);font-weight:700;border-radius:6px;transition:background .15s}
        .float-btn:hover{background:var(--s100)}
        .float-btn:disabled{opacity:.3;cursor:default}
        .float-label{font-size:11px;font-weight:700;color:var(--s500);min-width:40px;text-align:center}
        .sidebar{width:320px;background:var(--white);border-left:1px solid var(--s200);box-shadow:-4px 0 20px rgba(0,0,0,.05);display:flex;flex-direction:column;z-index:10}
        .sb-total{padding:20px;background:var(--s900);color:#fff;flex-shrink:0}
        .sb-total-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;opacity:.5;margin-bottom:2px}
        .sb-total-value{font-size:32px;font-weight:900}
        .sb-summary{padding:12px 16px;background:var(--s800);color:var(--s300);font-size:10px;display:flex;gap:12px;flex-shrink:0}
        .sb-summary span{display:flex;align-items:center;gap:4px}
        .sb-summary .dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
        .sb-summary .proj{background:#10b981}
        .sb-summary .exist{background:#f97316}
        .sb-summary .rur{background:#2563eb}
        .sb-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;background:var(--s100)}
        .sb-list::-webkit-scrollbar{width:6px}
        .sb-list::-webkit-scrollbar-thumb{background:var(--s300);border-radius:3px}
        .sb-empty{text-align:center;margin-top:40px;font-size:9px;color:var(--s400);font-weight:700;text-transform:uppercase}
        .poste-item{background:var(--white);padding:10px;border-radius:8px;border:1px solid var(--s200);display:flex;justify-content:space-between;align-items:center;transition:border-color .15s}
        .poste-item:hover{border-color:var(--b300)}
        .poste-left{display:flex;align-items:center;gap:10px}
        .poste-num{width:22px;height:22px;background:var(--s800);color:#fff;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
        .poste-tipo{font-size:9px;font-weight:900;text-transform:uppercase}
        .poste-tipo.projetado{color:var(--e600)}
        .poste-tipo.existente{color:var(--o600)}
        .poste-tipo.rural{color:var(--b600)}
        .poste-valor{font-size:8px;color:var(--s400);font-weight:700}
        .poste-del{background:none;border:none;color:var(--s300);cursor:pointer;font-size:13px;padding:4px;transition:color .15s}
        .poste-del:hover{color:var(--r500)}
        .sb-km{padding:12px 16px;border-top:1px solid var(--s200);background:var(--white);flex-shrink:0}
        .sb-km label{font-size:9px;font-weight:700;color:var(--s400);text-transform:uppercase;display:block;margin-bottom:4px}
        .sb-km input{width:100%;border:1px solid var(--s300);border-radius:6px;padding:8px;font-size:13px;font-family:monospace;font-weight:700;outline:none;text-align:center}
        .sb-km input:focus{border-color:var(--b500)}
        .legenda{padding:10px 16px;background:var(--s50);border-top:1px solid var(--s200);display:flex;gap:14px;align-items:center;flex-shrink:0}
        .leg-item{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:600;color:var(--s500)}
        .leg-dot{width:10px;height:10px;border-radius:3px}
        .leg-dot.proj{background:#10b981}
        .leg-dot.exist{background:#f97316}
        .leg-dot.rur{background:#2563eb}
        .hidden{display:none!important}
        #rel7-container{position:fixed;left:-9999px;top:0;background:#fff;padding:16px}
        #rel7-container table{border-collapse:collapse;font-family:'Inter',sans-serif;font-size:11px}
        #rel7-container th,#rel7-container td{border:1px solid #000;padding:6px 10px;text-align:center;min-width:80px}
        #rel7-container th{background:#1e293b;color:#fff;font-weight:700}
        #rel7-container td{background:#fff;color:#0f172a}
        #rel7-container .total-cell{font-weight:900;background:#f1f5f9}
        #rel7-container caption{font-weight:800;font-size:14px;margin-bottom:8px;text-align:left}

        /* Menu de contexto */
        .ctx-menu{position:fixed;background:var(--white);border:1px solid var(--s200);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:9999;min-width:160px;padding:4px;font-family:'Inter',sans-serif}
        .ctx-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;color:var(--s700);cursor:pointer;transition:background .12s}
        .ctx-item:hover{background:var(--s100)}
        .ctx-icon{font-size:13px;width:18px;text-align:center}
    </style>
</head>
<body>

<!-- CATRACA: roda antes de renderizar qualquer coisa -->
<script>
    (async function () {
        const HUB_URL = 'https://hub-sistemas-production.up.railway.app';
        const BACKEND = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3001'
            : 'https://back-contagem-production.up.railway.app';

        const params = new URLSearchParams(window.location.search);
        const tokenFromUrl = params.get('token');
        if (tokenFromUrl) {
            localStorage.setItem('hub_token', tokenFromUrl);
            window.history.replaceState({}, '', window.location.pathname);
        }

        const token = localStorage.getItem('hub_token');
        if (!token) {
            window.location.href = HUB_URL;
            return;
        }

        try {
            const res = await fetch(BACKEND + '/api/auth/validate', {
                headers: { Authorization: 'Bearer ' + token }
            });
            if (!res.ok) throw new Error('invalido');
        } catch (e) {
            localStorage.removeItem('hub_token');
            window.location.href = HUB_URL;
        }
    })();
</script>

<header>
    <div class="hdr-left">
        <div class="logo">
            <div class="logo-icon">📍</div>
            <div class="logo-text">US<br>TOPOGRAFIA</div>
        </div>
        <div class="ns-group">
            <div class="ns-label">NS (10 dígitos)</div>
            <input type="text" id="ns-input" class="ns-input" placeholder="0000000000" maxlength="10">
        </div>
    </div>
    <div class="hdr-right">
        <button class="btn-portal" onclick="window.location.href='https://hub-sistemas-production.up.railway.app'">Voltar ao Portal</button>
        <button id="btn-voltar" class="btn-voltar hidden" onclick="voltarUpload()">← VOLTAR</button>
        <button id="btn-salvar" class="btn-salvar hidden" onclick="salvarProjeto()">⬇ SALVAR (UNIFICADO)</button>
    </div>
    <div id="hdr-row2" class="hdr-row2 hidden">
        <div id="cats-bar" class="bar"><span class="bar-label">Cat</span></div>
        <div id="amb-bar" class="bar"><span class="bar-label">Amb</span></div>
        <div id="serv-bar" class="bar"><span class="bar-label">Serv</span></div>
        <div id="topo-bar" class="bar"><span class="bar-label">Topógrafo</span></div>
    </div>
</header>

<main>
    <div id="tela-upload" class="tela-upload">
        <div class="drop-area">
            <input type="file" id="file-input" accept="image/*,.pdf" multiple onchange="handleUpload(event)">
            <div class="drop-icon">📤</div>
            <div class="drop-title">Novo Levantamento</div>
            <div class="drop-sub">Imagens ou PDFs (múltiplos arquivos)</div>
        </div>
        <div class="hist-panel">
            <div class="hist-header">
                <div class="hist-top">
                    <div class="hist-title">🕒 Histórico</div>
                    <div class="hist-btns">
                        <button class="btn-rel7" onclick="gerarRelatorio7Dias()">📊 Relatório 7 Dias</button>
                        <button class="btn-excel" onclick="exportarExcel()">📥 EXCEL</button>
                    </div>
                </div>
                <div class="filtros">
                    <label>De:</label><input type="date" id="filtro-de">
                    <label>Até:</label><input type="date" id="filtro-ate">
                    <button class="btn-filtro hoje" onclick="filtroHoje()">Hoje</button>
                    <button class="btn-filtro" onclick="filtroLimpar()">Limpar</button>
                    <button class="btn-filtro" onclick="carregarHistorico()">🔍 Filtrar</button>
                </div>
            </div>
            <div id="hist-list" class="hist-list">
                <div class="loading" style="text-align:center;padding:40px;color:var(--s400);font-size:13px">Carregando...</div>
            </div>
        </div>
    </div>

    <div id="tela-desenho" class="tela-desenho hidden">
        <div class="canvas-area" id="canvas-area">
            <div class="canvas-wrapper" id="canvas-wrapper">
                <canvas id="canvas-base"></canvas>
                <canvas id="canvas-overlay" class="canvas-overlay" oncontextmenu="return false;"></canvas>
            </div>
            <div class="float-controls">
                <div class="float-group">
                    <button class="float-btn" onclick="prevPage()" id="btn-prev" disabled>◀</button>
                    <span class="float-label" id="page-info">1/1</span>
                    <button class="float-btn" onclick="nextPage()" id="btn-next" disabled>▶</button>
                </div>
                <div class="float-group">
                    <button class="float-btn" onclick="zoomOut()">−</button>
                    <span class="float-label" id="zoom-info">100%</span>
                    <button class="float-btn" onclick="zoomIn()">+</button>
                    <button class="float-btn" onclick="zoomReset()" style="font-size:11px">FIT</button>
                </div>
            </div>
        </div>
        <div class="sidebar">
            <div class="sb-total">
                <div class="sb-total-label">Total Estimado (todas as páginas)</div>
                <div id="total-us" class="sb-total-value">US 0,00</div>
            </div>
            <div id="sb-summary" class="sb-summary">
                <span><div class="dot proj"></div>0 Proj</span>
                <span><div class="dot exist"></div>0 Exist</span>
                <span><div class="dot rur"></div>0 Rural</span>
            </div>
            <div id="sb-list" class="sb-list">
                <div class="sb-empty">Clique na imagem para adicionar</div>
            </div>
            <div class="sb-km">
                <label>Cobrança KM (US)</label>
                <input type="text" id="km-input" placeholder="0,00" value="" oninput="atualizarTotal()">
            </div>
            <div class="legenda">
                <div class="leg-item"><div class="leg-dot proj"></div>Clique = Projetado</div>
                <div class="leg-item"><div class="leg-dot exist"></div>Dir. = Existente</div>
                <div class="leg-item"><div class="leg-dot rur"></div>Shift = Rural</div>
            </div>
        </div>
    </div>
</main>

<div id="rel7-container"></div>

<script src="app.js"></script>
</body>
</html>
